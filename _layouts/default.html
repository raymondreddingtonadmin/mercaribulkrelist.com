<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} - Bulk Relist Your Mercari Listings{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="mercari bulk relist, mercari relisting tool, bulk relist mercari, mercari seller tools, relist mercari listings, mercari automation">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/favicon.png' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ '/og-image.png' | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{{ '/og-image.png' | absolute_url }}">

  {% seo %}

  <!-- Schema.org SoftwareApplication markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Mercari Bulk Relist",
    "operatingSystem": "Chrome",
    "applicationCategory": "BrowserApplication",
    "applicationSubCategory": "Shopping",
    "description": "Bulk relist your Mercari listings in one click. Select multiple items, relist them all instantly with human-like delays.",
    "offers": [
      {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier - 3 relists per day"
      },
      {
        "@type": "Offer",
        "price": "4.99",
        "priceCurrency": "USD",
        "description": "Pro monthly - unlimited relists",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "billingDuration": "P1M"
        }
      },
      {
        "@type": "Offer",
        "price": "29.99",
        "priceCurrency": "USD",
        "description": "Pro yearly - unlimited relists",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "billingDuration": "P1Y"
        }
      }
    ],
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "5",
      "ratingCount": "1",
      "bestRating": "5"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #3b82f6;
      --color-primary-dark: #2563eb;
      --color-primary-glow: rgba(59,130,246,0.15);
      --color-text: #0f172a;
      --color-text-secondary: #475569;
      --color-text-tertiary: #94a3b8;
      --color-bg: #ffffff;
      --color-bg-subtle: #f8fafc;
      --color-bg-muted: #f1f5f9;
      --color-border: #e2e8f0;
      --color-border-light: #f1f5f9;
      --color-success: #10b981;
      --max-width: 1100px;
      --radius: 10px;
      --radius-lg: 16px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border-light);
      padding: 0.875rem 0;
    }
    .nav .container { display: flex; justify-content: space-between; align-items: center; }
    .nav-brand { font-size: 1.0625rem; font-weight: 700; color: var(--color-text); text-decoration: none; letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { color: var(--color-text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.15s; }
    .nav-links a:hover { color: var(--color-text); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.75rem 1.75rem; border-radius: var(--radius); font-weight: 600;
      font-size: 0.9375rem; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none;
      letter-spacing: -0.01em;
    }
    .btn-primary {
      background: var(--color-primary); color: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 0 0 1px rgba(59,130,246,0.1);
    }
    .btn-primary:hover {
      background: var(--color-primary-dark);
      box-shadow: 0 4px 16px rgba(59,130,246,0.25), 0 0 0 1px rgba(59,130,246,0.15);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: transparent; color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover { background: var(--color-bg-subtle); color: var(--color-text); border-color: #cbd5e1; }
    .btn-large { padding: 0.875rem 2rem; font-size: 1rem; }

    /* Hero */
    .hero {
      padding: 7rem 0 5rem; text-align: center;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, var(--color-primary-glow) 0%, transparent 70%);
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--color-bg-subtle); border: 1px solid var(--color-border);
      color: var(--color-text-secondary); font-size: 0.8125rem; font-weight: 500;
      padding: 0.375rem 0.875rem; border-radius: 100px; margin-bottom: 2rem;
    }
    .hero-badge::before { content: ""; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
    .hero h1 {
      font-size: clamp(2.25rem, 5vw, 3.5rem); font-weight: 800;
      line-height: 1.1; letter-spacing: -0.03em;
      margin-bottom: 1.25rem; max-width: 640px; margin-left: auto; margin-right: auto;
    }
    .hero > .container > p {
      font-size: 1.125rem; color: var(--color-text-secondary);
      max-width: 480px; margin: 0 auto 2.5rem; line-height: 1.6; font-weight: 400;
    }
    .hero-cta { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .hero-stats {
      display: flex; justify-content: center; gap: 4rem;
      margin-top: 4rem; padding-top: 2.5rem; border-top: 1px solid var(--color-border);
    }
    .hero-stat-value { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--color-text); }
    .hero-stat-label { font-size: 0.8125rem; color: var(--color-text-tertiary); margin-top: 0.25rem; font-weight: 400; }

    /* Sections */
    section { padding: 5.5rem 0; }
    .section-header { text-align: center; margin-bottom: 3.5rem; }
    .section-header h2 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.625rem; }
    .section-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 480px; margin: 0 auto; }
    .section-label {
      display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--color-primary); margin-bottom: 0.75rem;
    }

    /* Features */
    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--color-border); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-border); }
    .feature-card { background: var(--color-bg); padding: 2rem; }
    .feature-card h3 { font-size: 0.9375rem; font-weight: 700; margin-bottom: 0.375rem; letter-spacing: -0.01em; }
    .feature-card p { color: var(--color-text-secondary); font-size: 0.875rem; line-height: 1.55; }
    .feature-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; color: var(--color-primary); }

    /* Steps */
    .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; counter-reset: step; max-width: 900px; margin: 0 auto; }
    .step { text-align: left; counter-increment: step; position: relative; padding-left: 3.5rem; }
    .step::before {
      content: counter(step); position: absolute; left: 0; top: 0;
      width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center;
      background: var(--color-text); color: #fff; border-radius: 8px; font-weight: 700; font-size: 0.875rem;
    }
    .step h3 { font-size: 0.9375rem; font-weight: 700; margin-bottom: 0.375rem; letter-spacing: -0.01em; }
    .step p { font-size: 0.875rem; color: var(--color-text-secondary); line-height: 1.55; }

    /* Pricing */
    .pricing-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 680px; margin: 0 auto; }
    .pricing-card {
      background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
      padding: 2.25rem 2rem; position: relative;
    }
    .pricing-card.featured { border-color: var(--color-primary); box-shadow: 0 0 0 1px var(--color-primary), 0 8px 32px rgba(59,130,246,0.1); }
    .pricing-card.featured::before {
      content: "Popular"; position: absolute; top: -0.625rem; right: 1.25rem;
      background: var(--color-primary); color: #fff; padding: 0.125rem 0.625rem;
      border-radius: 4px; font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.02em;
    }
    .pricing-card h3 { font-size: 0.875rem; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .pricing-price { font-size: 2.25rem; font-weight: 800; letter-spacing: -0.03em; }
    .pricing-period { color: var(--color-text-tertiary); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .pricing-features { list-style: none; margin-bottom: 1.75rem; }
    .pricing-features li { padding: 0.375rem 0; font-size: 0.875rem; color: var(--color-text-secondary); display: flex; align-items: center; gap: 0.5rem; }
    .pricing-features li::before { content: "\2713"; color: var(--color-success); font-weight: 700; font-size: 0.75rem; }
    .pricing-save {
      display: inline-block; background: #ecfdf5; color: var(--color-success);
      font-size: 0.75rem; font-weight: 600; padding: 0.125rem 0.5rem; border-radius: 4px;
    }

    /* Testimonials */
    .testimonials { display: flex; gap: 1.5rem; justify-content: center; max-width: 900px; margin: 0 auto; }
    .testimonial {
      flex: 1; padding: 1.75rem; border-left: 2px solid var(--color-primary);
      background: var(--color-bg); border-radius: 0 var(--radius) var(--radius) 0;
    }
    .testimonial p { color: var(--color-text); font-size: 0.9375rem; line-height: 1.6; font-style: italic; margin: 0; }

    /* Blog */
    .blog-list { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 0; }
    .blog-item { padding: 1.5rem 0; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: baseline; gap: 2rem; }
    .blog-item:first-child { padding-top: 0; }
    .blog-item:last-child { border-bottom: none; padding-bottom: 0; }
    .blog-item-title { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    .blog-item-title a { color: var(--color-text); text-decoration: none; transition: color 0.15s; }
    .blog-item-title a:hover { color: var(--color-primary); }
    .blog-item-date { font-size: 0.8125rem; color: var(--color-text-tertiary); white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* CTA */
    .cta-section {
      text-align: center; padding: 6rem 0;
      background: var(--color-text); color: #fff;
    }
    .cta-section h2 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.75rem; color: #fff; }
    .cta-section p { color: #94a3b8; font-size: 1rem; margin-bottom: 2rem; max-width: 420px; margin-left: auto; margin-right: auto; }
    .cta-section .btn-primary { background: #fff; color: var(--color-text); }
    .cta-section .btn-primary:hover { background: #f1f5f9; box-shadow: 0 4px 16px rgba(255,255,255,0.15); }

    /* Footer */
    .footer { padding: 2.5rem 0; border-top: 1px solid var(--color-border); text-align: center; font-size: 0.8125rem; color: var(--color-text-tertiary); }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.75rem; list-style: none; }
    .footer-links a { color: var(--color-text-tertiary); text-decoration: none; font-size: 0.8125rem; }
    .footer-links a:hover { color: var(--color-text-secondary); }

    /* Post layout */
    .post { padding: 4rem 0 3rem; }
    .post-header { margin-bottom: 2.5rem; }
    .post-back { font-size: 0.8125rem; color: var(--color-text-tertiary); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; transition: color 0.15s; }
    .post-back:hover { color: var(--color-text-secondary); }
    .post-title { font-size: clamp(1.75rem, 4vw, 2.25rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 0.625rem; }
    .post-date { font-size: 0.875rem; color: var(--color-text-tertiary); }

    /* Post content */
    .post-content { font-size: 1.0625rem; line-height: 1.75; color: var(--color-text); }
    .post-content h1 { display: none; }
    .post-content h2 { font-size: 1.375rem; font-weight: 700; letter-spacing: -0.02em; margin: 2.5rem 0 0.75rem; }
    .post-content h3 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.01em; margin: 2rem 0 0.5rem; }
    .post-content p { margin-bottom: 1.25rem; }
    .post-content ul, .post-content ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
    .post-content li { margin-bottom: 0.375rem; }
    .post-content strong { font-weight: 600; }
    .post-content a { color: var(--color-primary); text-decoration: underline; text-underline-offset: 2px; }
    .post-content a:hover { color: var(--color-primary-dark); }

    /* Responsive */
    @media (max-width: 768px) {
      .hero { padding: 5rem 0 3.5rem; }
      .hero h1 { font-size: 2rem; }
      .hero-stats { flex-direction: column; gap: 1.5rem; }
      section { padding: 3.5rem 0; }
      .nav-links { display: none; }
      .features-grid { grid-template-columns: 1fr; }
      .steps { grid-template-columns: 1fr; gap: 1.5rem; }
      .pricing-grid { grid-template-columns: 1fr; }
      .testimonials { flex-direction: column; }
      .blog-item { flex-direction: column; gap: 0.25rem; }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
