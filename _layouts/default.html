<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} - Bulk Relist Your Mercari Listings{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="mercari bulk relist, mercari relisting tool, bulk relist mercari, mercari seller tools, relist mercari listings, mercari automation">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  {% seo %}

  <!-- Schema.org SoftwareApplication markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Mercari Bulk Relist",
    "operatingSystem": "Chrome",
    "applicationCategory": "BrowserApplication",
    "applicationSubCategory": "Shopping",
    "description": "Bulk relist your Mercari listings in one click. Select multiple items, relist them all instantly with human-like delays.",
    "offers": [
      {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier - 3 relists per day"
      },
      {
        "@type": "Offer",
        "price": "4.99",
        "priceCurrency": "USD",
        "description": "Pro monthly - unlimited relists",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "billingDuration": "P1M"
        }
      },
      {
        "@type": "Offer",
        "price": "29.99",
        "priceCurrency": "USD",
        "description": "Pro yearly - unlimited relists",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "billingDuration": "P1Y"
        }
      }
    ],
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "5",
      "ratingCount": "1",
      "bestRating": "5"
    }
  }
  </script>

  <style>
    /* Reset and base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-primary-light: #dbeafe;
      --color-text: #1e293b;
      --color-text-secondary: #64748b;
      --color-bg: #ffffff;
      --color-bg-alt: #f8fafc;
      --color-border: #e2e8f0;
      --color-success: #16a34a;
      --color-accent: #7c3aed;
      --max-width: 1120px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }

    /* Navigation */
    .nav {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--color-border);
      z-index: 100;
      padding: 1rem 0;
    }
    .nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--color-primary); }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    .btn-outline {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
    }
    .btn-outline:hover {
      background: var(--color-primary-light);
    }
    .btn-large { padding: 1rem 2.5rem; font-size: 1.125rem; }

    /* Hero */
    .hero {
      padding: 6rem 0 5rem;
      text-align: center;
      background: linear-gradient(180deg, var(--color-bg) 0%, var(--color-bg-alt) 100%);
    }
    .hero-badge {
      display: inline-block;
      background: var(--color-primary-light);
      color: var(--color-primary);
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.375rem 1rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1.25rem;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero p {
      font-size: 1.25rem;
      color: var(--color-text-secondary);
      max-width: 580px;
      margin: 0 auto 2.5rem;
      line-height: 1.5;
    }
    .hero-cta { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 3.5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--color-border);
    }
    .hero-stat { text-align: center; }
    .hero-stat-value { font-size: 1.75rem; font-weight: 800; color: var(--color-text); }
    .hero-stat-label { font-size: 0.875rem; color: var(--color-text-secondary); margin-top: 0.25rem; }

    /* Sections */
    section { padding: 5rem 0; }
    section:nth-child(even) { background: var(--color-bg-alt); }
    .section-header { text-align: center; margin-bottom: 3.5rem; }
    .section-header h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }
    .section-header p {
      font-size: 1.125rem;
      color: var(--color-text-secondary);
      max-width: 560px;
      margin: 0 auto;
    }

    /* Features */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    .feature-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 2rem;
      transition: box-shadow 0.2s;
    }
    .feature-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--color-primary-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 1.25rem;
    }
    .feature-card h3 {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .feature-card p {
      color: var(--color-text-secondary);
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* How it works */
    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      counter-reset: step;
    }
    .step {
      text-align: center;
      position: relative;
      counter-increment: step;
    }
    .step::before {
      content: counter(step);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--color-primary);
      color: #fff;
      border-radius: 50%;
      font-weight: 700;
      font-size: 1.25rem;
      margin: 0 auto 1.25rem;
    }
    .step h3 { font-size: 1.0625rem; font-weight: 700; margin-bottom: 0.5rem; }
    .step p { font-size: 0.9375rem; color: var(--color-text-secondary); }

    /* Pricing */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      max-width: 720px;
      margin: 0 auto;
    }
    .pricing-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
    }
    .pricing-card.featured {
      border-color: var(--color-primary);
      box-shadow: 0 4px 24px rgba(37, 99, 235, 0.12);
    }
    .pricing-card.featured::before {
      content: "Most Popular";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-primary);
      color: #fff;
      padding: 0.25rem 1rem;
      border-radius: 100px;
      font-size: 0.8125rem;
      font-weight: 600;
    }
    .pricing-card h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    .pricing-price {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 1rem 0 0.25rem;
    }
    .pricing-period { color: var(--color-text-secondary); font-size: 0.9375rem; margin-bottom: 1.5rem; }
    .pricing-features { list-style: none; margin-bottom: 2rem; text-align: left; }
    .pricing-features li {
      padding: 0.5rem 0;
      font-size: 0.9375rem;
      color: var(--color-text-secondary);
      border-bottom: 1px solid var(--color-border);
    }
    .pricing-features li::before {
      content: "\2713";
      color: var(--color-success);
      font-weight: 700;
      margin-right: 0.75rem;
    }
    .pricing-save {
      display: inline-block;
      background: #dcfce7;
      color: var(--color-success);
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      margin-bottom: 0.5rem;
    }

    /* Comparison */
    .comparison-table {
      max-width: 640px;
      margin: 0 auto;
      border-collapse: collapse;
      width: 100%;
    }
    .comparison-table th,
    .comparison-table td {
      padding: 1rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.9375rem;
    }
    .comparison-table th {
      font-weight: 700;
      background: var(--color-bg-alt);
    }
    .comparison-table td:nth-child(2) { color: var(--color-primary); font-weight: 600; }
    .comparison-table td:nth-child(3) { color: var(--color-text-secondary); }
    .comparison-table thead th:first-child { border-radius: 8px 0 0 0; }
    .comparison-table thead th:last-child { border-radius: 0 8px 0 0; }

    /* Reviews */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .review-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 2rem;
    }
    .review-stars { color: #f59e0b; font-size: 1.125rem; margin-bottom: 0.75rem; letter-spacing: 2px; }
    .review-text {
      color: var(--color-text-secondary);
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 1rem;
      font-style: italic;
    }
    .review-author { font-weight: 600; font-size: 0.875rem; }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 5rem 0;
      background: linear-gradient(135deg, #eff6ff 0%, #f0f4ff 100%);
    }
    .cta-section h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    .cta-section p {
      color: var(--color-text-secondary);
      font-size: 1.125rem;
      margin-bottom: 2rem;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Footer */
    .footer {
      padding: 3rem 0;
      border-top: 1px solid var(--color-border);
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.875rem;
    }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1rem; list-style: none; }
    .footer-links a { color: var(--color-text-secondary); text-decoration: none; }
    .footer-links a:hover { color: var(--color-primary); }

    /* Responsive */
    @media (max-width: 768px) {
      .hero { padding: 4rem 0 3.5rem; }
      .hero-stats { flex-direction: column; gap: 1.5rem; }
      section { padding: 3.5rem 0; }
      .nav-links { display: none; }
      .pricing-grid { grid-template-columns: 1fr; }
      .comparison-table { font-size: 0.875rem; }
      .comparison-table th, .comparison-table td { padding: 0.75rem; }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
